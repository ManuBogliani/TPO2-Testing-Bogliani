name: Pipeline TPO Testing

on:
  push:
    branches: [ "main", "master" ] # Así cubre cualquier nombre de rama
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-html
        # Si tenés un requirements.txt lo usa, si no, no falla
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar Tests
      run: |
        # Usamos python -m para evitar problemas de rutas
        python -m pytest -v --html=reporte_entrega.html --self-contained-html

    - name: Subir Reporte (Artefacto)
      if: always() # Esto hace que se suba aunque los tests fallen
      uses: actions/upload-artifact@v4
      with:
        name: reporte-de-pruebas
        path: reporte_entrega.html
